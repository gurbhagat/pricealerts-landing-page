<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Moved | PriceAlerts.org</title>
    
    <meta http-equiv="refresh" content="5; url=https://pricealerts.org/">
    
    <style>
        /* Reuse the same CSS from index.html for visual consistency */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #fff; padding: 3rem 2rem; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; max-width: 550px; border-top: 6px solid #e74c3c; /* Red bar to indicate "Not Found" */ }

        p { color: #5d6d7e; margin-bottom: 1.5rem; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 2s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-block; color: #27ae60; font-weight: bold; text-decoration: none; margin-top: 1rem; }
    </style>
</head>

    </div>
